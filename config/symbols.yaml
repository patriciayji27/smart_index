# Underlyings and vol instruments to track

index:
  primary: SPX
  secondary:
    - NDX
    - RUT

vol_instruments:
  vix: ^VIX
  vix_futures: []          # populate with specific contract codes
  vvix: ^VVIX             # vol-of-vol

etf_proxies:
  spx: SPY
  ndx: QQQ
  rut: IWM

# Option chain tickers (data-source specific)
option_chains:
  spx: SPX
  spy: SPY                 # more liquid for short-dated

# Standard tenors for surface construction (calendar days)
surface_tenors: [7, 14, 30, 60, 90, 120, 180, 365]

# Moneyness grid (strike / forward, or delta-space)
moneyness_type: delta      # "delta" or "strike_ratio"
moneyness_grid: [0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.50,
                 0.60, 0.65, 0.70, 0.75, 0.80, 0.85, 0.90]
