# Underlyings, vol instruments, sector ETFs, and dispersion indices to track

# ── Core index ────────────────────────────────────────────────────────────────
index:
  primary: SPX
  secondary:
    - NDX
    - RUT

# ── Vol instruments (CBOE) ───────────────────────────────────────────────────
vol_instruments:
  vix:   ^VIX
  vvix:  ^VVIX             # Vol-of-vol
  vixeq: VIXEQ             # Equity-weighted VIX variant

  # Implied correlation indices (COR series)
  cor1m:  COR1M            # 1-month implied correlation
  cor3m:  COR3M            # 3-month implied correlation (primary)
  cor10d: COR10D           # Implied correlation at 10-delta (deep OTM puts)
  cor90d: COR90D           # Implied correlation at 90-delta (near upside)

  # Dispersion index
  dspx: DSPX               # S&P 500 Dispersion Index (10yr median: 24.4)

# ── ETF proxies (for easier data access) ─────────────────────────────────────
etf_proxies:
  spx: SPY                 # S&P 500
  ndx: QQQ                 # Nasdaq 100
  rut: IWM                 # Russell 2000

# ── Sector ETFs (tech spread research) ───────────────────────────────────────
sector_etfs:
  tech_broad: XLK          # S&P 500 Technology Select Sector SPDR
  software:   IGV          # iShares Expanded Tech-Software Sector ETF
  ndx:        QQQ          # Nasdaq 100 (broad tech proxy)
  semis:      SOXX         # iShares PHLX Semiconductor ETF
  defensives: XLU          # Utilities (risk-off benchmark)
  value:      IVE          # S&P 500 Value ETF (rotation signal)

# ── Macro data (FRED codes) ───────────────────────────────────────────────────
macro:
  tips_10yr:  DFII10       # 10-year TIPS yield (real rate)
  ffr:        DFF          # Federal Funds Rate
  yield_curve: T10Y2Y      # 10yr - 2yr spread
  ig_oas:     BAMLC0A0CM   # ICE BofA IG Corporate OAS

# ── Option chain tickers ──────────────────────────────────────────────────────
option_chains:
  spx: SPX                 # Primary: European-exercise, no dividend adjustment needed
  spy: SPY                 # Liquid for short-dated; American-exercise (note adjustment)
  xlk: XLK                 # Tech sector options (for tech IV / VIX ratio)

# ── Surface construction parameters ─────────────────────────────────────────
surface_tenors: [7, 14, 30, 60, 90, 120, 180, 365]

moneyness_type: delta
moneyness_grid: [0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.50,
                 0.60, 0.65, 0.70, 0.75, 0.80, 0.85, 0.90]

# Delta levels for correlation smile (COR10D / COR90D proxy)
correlation_smile_deltas: [0.10, 0.50, 0.90]

# ── Mag7 constituents (for concentration analysis) ───────────────────────────
mag7:
  tickers: [AAPL, MSFT, NVDA, AMZN, GOOGL, META, TSLA]
  # Approximate weights as of early 2025 — update periodically
  approx_weights:
    AAPL:  0.072
    MSFT:  0.065
    NVDA:  0.068
    AMZN:  0.040
    GOOGL: 0.041
    META:  0.027
    TSLA:  0.018
  note: "Combined ~33% of SPX as of Q1 2025. Was ~22% in 2020, ~12% in 2015."
